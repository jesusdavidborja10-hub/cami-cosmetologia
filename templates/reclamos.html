<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>Reclamos — Cami Cosmetología</title>
  <meta name="robots" content="noindex">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap');

:root {
  --rose:        #E8829A;
  --rose3:       #C04060;
  --gold:        #C9A96E;
  --dark:        #140C10;
  --dark-card:   #1E1118;
  --dark-border: rgba(232,130,154,.15);
  --text-light:  #F9EEF3;
  --text-muted:  #A08898;
  --nav-h:       70px;
  --font-display:'Cormorant Garamond', serif;
  --font-body:   'Jost', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--text-light);
  min-height: 100vh;
  padding-top: var(--nav-h);
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(232,130,154,.1) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,169,110,.06) 0%, transparent 50%);
}

/* ── Navbar ── */
.barra-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9996;
  height: var(--nav-h);
  background: rgba(20,12,16,.95);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-bottom: 0.5px solid rgba(232,130,154,.15);
  display: flex; align-items: center;
}
.barra-nav::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rose) 20%, var(--gold) 50%, var(--rose) 80%, transparent);
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  width: 100%; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-brand-icon {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--rose);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 0 14px rgba(232,130,154,.25);
}
.nav-brand-name {
  font-family: var(--font-display);
  font-size: 1.6rem; font-weight: 500; letter-spacing: 2px; color: #fff;
}
.nav-brand-name span { color: var(--rose); font-style: italic; }
.btn-volver {
  padding: 9px 20px; border-radius: 20px;
  border: 0.5px solid rgba(201,169,110,.4);
  background: transparent; color: var(--gold);
  font-family: var(--font-body); font-size: .72rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  text-decoration: none; transition: all .3s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-volver:hover { border-color: var(--gold); background: rgba(201,169,110,.08); }

/* ── Layout ── */
.page-wrap {
  min-height: calc(100vh - var(--nav-h));
  display: flex; align-items: center; justify-content: center;
  padding: 48px 24px; position: relative; z-index: 1;
}
.reclamo-card {
  background: var(--dark-card); border: 0.5px solid var(--dark-border);
  border-radius: 28px; padding: 44px 48px; width: 100%; max-width: 520px;
  position: relative; overflow: hidden;
}
.reclamo-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rose) 40%, var(--gold) 60%, transparent);
}

/* ── Formulario ── */
.card-icon {
  width: 58px; height: 58px; border-radius: 50%;
  border: 1px solid var(--rose);
  box-shadow: 0 0 20px rgba(232,130,154,.4), 0 0 50px rgba(232,130,154,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 20px;
}
.card-title {
  font-family: var(--font-display); font-size: 2.2rem; font-weight: 400;
  color: #fff; text-align: center; margin-bottom: 6px;
}
.card-sub {
  color: var(--text-muted); text-align: center; font-size: .85rem;
  margin-bottom: 32px; font-weight: 300; line-height: 1.6;
}
.fields { display: flex; flex-direction: column; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 7px; }
label {
  font-size: .68rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted); font-weight: 400;
}
input, textarea {
  background: rgba(255,255,255,.03);
  border: 0.5px solid var(--dark-border);
  border-radius: 12px; padding: 13px 16px;
  color: var(--text-light); font-family: var(--font-body); font-size: .9rem;
  transition: all .2s; outline: none; width: 100%;
}
input:focus, textarea:focus {
  border-color: rgba(232,130,154,.5);
  box-shadow: 0 0 0 3px rgba(232,130,154,.1);
}
textarea { resize: vertical; min-height: 110px; }

.btn-submit {
  width: 100%; padding: 16px; border: none; border-radius: 30px;
  background: linear-gradient(135deg, var(--rose3), var(--rose));
  color: #fff; font-family: var(--font-body); font-size: .78rem;
  font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all .3s; margin-top: 8px;
}
.btn-submit:hover { box-shadow: 0 6px 28px rgba(232,130,154,.45); transform: translateY(-1px); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

.msg-error {
  color: var(--rose); font-size: .8rem; margin-top: 8px;
  text-align: center; display: none;
}

/* ── Éxito ── */
@keyframes fadeUpIn {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to   { opacity: 1; transform: none; }
}
.success-card {
  display: none; flex-direction: column;
  align-items: center; text-align: center; gap: 16px;
}
.success-card.visible {
  display: flex;
  animation: fadeUpIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
.success-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(129,199,132,.1); border: 1px solid #81c784;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; box-shadow: 0 0 24px rgba(129,199,132,.25);
}
.success-title { font-family: var(--font-display); font-size: 2rem; color: #fff; }
.success-desc {
  color: var(--text-muted); font-size: .88rem; line-height: 1.7;
  font-weight: 300; max-width: 340px;
}
.btn-volver-inicio {
  padding: 12px 28px; border-radius: 30px;
  border: 0.5px solid rgba(201,169,110,.4);
  background: transparent; color: var(--gold);
  font-family: var(--font-body); font-size: .72rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  text-decoration: none; transition: all .3s;
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
}
.btn-volver-inicio:hover { border-color: var(--gold); background: rgba(201,169,110,.08); }

@media (max-width: 480px) {
  .reclamo-card { padding: 32px 20px; }
  .card-title { font-size: 1.8rem; }
  .nav-brand-name { font-size: 1.2rem; }
}
  </style>
</head>
<body>

<nav class="barra-nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <div class="nav-brand-icon">🌸</div>
      <span class="nav-brand-name">CAMI <span>Cosmetología</span></span>
    </a>
    <a href="/" class="btn-volver">← Volver al inicio</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="reclamo-card">

    <!-- Formulario -->
    <div id="formSection">
      <div class="card-icon">📝</div>
      <h1 class="card-title">Reclamos</h1>
      <p class="card-sub">¿Tuviste algún inconveniente? Cuéntanos y lo atenderemos a la brevedad.</p>
      <div class="fields">
        <div class="field">
          <label for="recNombre">Nombre</label>
          <input type="text" id="recNombre" placeholder="Tu nombre completo" autocomplete="name">
        </div>
        <div class="field">
          <label for="recEmail">Correo electrónico</label>
          <input type="email" id="recEmail" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="recTelefono">Teléfono <span style="color:var(--text-muted);font-size:.65rem;letter-spacing:1px;text-transform:none;">(opcional)</span></label>
          <input type="tel" id="recTelefono" placeholder="+57 300 000 0000" autocomplete="tel">
        </div>
        <div class="field">
          <label for="recMensaje">Mensaje</label>
          <textarea id="recMensaje" placeholder="Describe tu reclamo con detalle..."></textarea>
        </div>
        <button class="btn-submit" id="btnEnviarReclamo" onclick="enviarReclamo()">Enviar reclamo</button>
        <p class="msg-error" id="recError"></p>
      </div>
    </div>

    <!-- Éxito -->
    <div id="successSection" class="success-card">
      <div class="success-icon">✓</div>
      <h2 class="success-title">¡Reclamo recibido!</h2>
      <p class="success-desc">Gracias por comunicarte con nosotros. Revisaremos tu mensaje y te responderemos a la brevedad.</p>
      <a href="/" class="btn-volver-inicio">← Volver al inicio</a>
    </div>

  </div>
</div>

<script>
async function enviarReclamo() {
  const btn     = document.getElementById('btnEnviarReclamo');
  const errorEl = document.getElementById('recError');
  const nombre  = document.getElementById('recNombre').value.trim();
  const email   = document.getElementById('recEmail').value.trim();
  const telefono = document.getElementById('recTelefono').value.trim();
  const mensaje = document.getElementById('recMensaje').value.trim();

  errorEl.style.display = 'none';

  if (!nombre || !email || !mensaje) {
    errorEl.textContent = 'Por favor completa nombre, correo y mensaje.';
    errorEl.style.display = 'block';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errorEl.textContent = 'Ingresa un correo electrónico válido.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const r = await fetch('/api/reclamos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, telefono: telefono || null, mensaje })
    });
    const data = await r.json();
    if (!r.ok) {
      errorEl.textContent = data.error || 'Error al enviar. Intenta de nuevo.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Enviar reclamo';
      return;
    }
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').classList.add('visible');
  } catch {
    errorEl.textContent = 'Error de conexión. Intenta de nuevo.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar reclamo';
  }
}
</script>

</body>
</html>
