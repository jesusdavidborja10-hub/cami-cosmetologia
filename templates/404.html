<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <title>Página no encontrada — Cami Cosmetología</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap');

:root {
  --rose:        #E8829A;
  --gold:        #C9A96E;
  --dark:        #140C10;
  --dark-card:   #1E1118;
  --dark-border: rgba(232,130,154,.15);
  --text-light:  #F9EEF3;
  --text-muted:  #A08898;
  --font-display: 'Cormorant Garamond', serif;
  --font-body:    'Jost', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { overflow-x: hidden; }

body {
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--text-light);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(232,130,154,.1) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,169,110,.06) 0%, transparent 50%),
    radial-gradient(ellipse 90% 70% at 50% 50%, rgba(20,12,16,1) 0%, transparent 100%);
}

.error-404 {
  position: relative;
  z-index: 1;
  max-width: 520px;
}

.error-404-emoji {
  font-size: 5rem;
  display: inline-block;
  filter: drop-shadow(0 0 24px rgba(232,130,154,.35));
  animation: flotar 4s ease-in-out infinite;
}

@keyframes flotar {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

.error-404-codigo {
  font-family: var(--font-display);
  font-size: 1rem;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 18px;
}

.error-404-titulo {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 500;
  color: var(--text-light);
  margin-top: 10px;
  text-shadow: 0 0 20px rgba(232,130,154,.25);
}

.error-404-subtitulo {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.2rem;
  color: var(--text-muted);
  margin-top: 14px;
}

.error-404-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 36px;
  padding: 14px 36px;
  border-radius: 30px;
  border: 0.5px solid rgba(232,130,154,.3);
  background: rgba(232,130,154,.06);
  color: var(--rose);
  font-family: var(--font-body);
  font-size: .78rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all .3s;
}

.error-404-btn:hover {
  background: rgba(232,130,154,.15);
  border-color: var(--rose);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,130,154,.25);
}
  </style>
</head>
<body>
  <div class="error-404">
    <span class="error-404-emoji">🌸</span>
    <div class="error-404-codigo">Error 404</div>
    <h1 class="error-404-titulo">Página no encontrada</h1>
    <p class="error-404-subtitulo">Esta página no existe o fue movida</p>
    <a href="/" class="error-404-btn">Volver al inicio</a>
  </div>
</body>
</html>
